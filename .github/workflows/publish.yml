jobs:
  check:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6'
      - env:
          COMMIT_SHA: '${{ github.sha }}'
          GH_TOKEN: '${{ github.token }}'
        id: 'check'
        name: 'Wait for workflows'
        run: |
          sha="$COMMIT_SHA"
          for i in $(seq 1 30); do
            all_done=true
            for workflow in QA Tests; do
              status=$(gh run list -w "$workflow" --commit "$sha" --json conclusion -q '.[0].conclusion')
              if [[ "$status" == 'failure' || "$status" == 'cancelled' ]]; then
                echo "::error::Workflow '$workflow' ${status}."
                exit 1
              elif [[ "$status" != 'success' ]]; then
                echo "Workflow '$workflow' still pending."
                all_done=false
              fi
            done
            if [[ "$all_done" == 'true' ]]; then
              echo 'All workflows succeeded.'
              exit 0
            fi
            echo "Waiting 60s for workflows to complete (attempt ${i}/30)..."
            sleep 60
          done
          echo '::error::Timed out waiting for workflows.'
          exit 1
  publish:
    needs:
      - 'check'
    permissions:
      contents: 'write'
      id-token: 'write'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6'
      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v6'
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
      - name: 'Update npm'
        run: 'npm install -g npm@latest'
      - name: 'Yarn cache'
        uses: 'actions/cache@v5'
        with:
          key: "${{ runner.os }}-yarn-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}"
          path: '~/.yarn/berry'
          restore-keys: '${ runner.os }}-yarn'
      - name: 'Install dependencies'
        run: 'yarn'
      - name: 'Build'
        run: 'yarn tsc'
      - name: 'Publish to NPM'
        run: 'yarn npm publish'
      - uses: 'softprops/action-gh-release@v2'
        with:
          draft: true
name: 'Publish'
'on':
  push:
    tags:
      - 'v*'
permissions:
  contents: 'write'
  id-token: 'write'
